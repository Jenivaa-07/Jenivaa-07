<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 180" width="100%" height="180">
  <defs>
    <!-- Background Gradient (Black) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050508" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="1" />
    </linearGradient>

    <!-- Streaks Gradients -->
    <linearGradient id="redStreak" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff1744" stop-opacity="0" />
      <stop offset="40%" stop-color="#ff1744" stop-opacity="0.1" />
      <stop offset="55%" stop-color="#ff1744" stop-opacity="0.8" />
      <stop offset="70%" stop-color="#ff1744" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff1744" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="magentaStreak" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="10%" stop-color="#ff2d75" stop-opacity="0" />
      <stop offset="45%" stop-color="#ff2d75" stop-opacity="0.2" />
      <stop offset="60%" stop-color="#ff2d75" stop-opacity="0.9" />
      <stop offset="75%" stop-color="#ff2d75" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ff2d75" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="whiteStreak" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="75%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background Rect -->
  <rect width="1600" height="180" fill="url(#bgGrad)" />

  <!-- Sweeping Racing Lines -->
  <!-- Thick ambient glow path 1 (Red) -->
  <path d="M -50 120 C 400 120, 600 60, 1000 90 C 1300 110, 1450 140, 1650 140" fill="none" stroke="url(#redStreak)" stroke-width="16" opacity="0.2" />
  <!-- Thick ambient glow path 2 (Magenta) -->
  <path d="M -50 140 C 300 140, 700 80, 1100 80 C 1350 80, 1500 120, 1650 120" fill="none" stroke="url(#magentaStreak)" stroke-width="14" opacity="0.2" />

  <!-- Core Streaks (Red) -->
  <path d="M -50 120 C 400 120, 600 60, 1000 90 C 1300 110, 1450 140, 1650 140" fill="none" stroke="url(#redStreak)" stroke-width="4" stroke-linecap="round" />
  <path d="M -50 130 C 420 130, 580 70, 980 95 C 1280 115, 1460 130, 1650 130" fill="none" stroke="url(#redStreak)" stroke-width="1.5" stroke-linecap="round" />

  <!-- Core Streaks (Magenta) -->
  <path d="M -50 140 C 300 140, 700 80, 1100 80 C 1350 80, 1500 120, 1650 120" fill="none" stroke="url(#magentaStreak)" stroke-width="3" stroke-linecap="round" />
  <path d="M -50 135 C 320 135, 680 85, 1080 85 C 1330 85, 1490 125, 1650 125" fill="none" stroke="url(#magentaStreak)" stroke-width="1" stroke-linecap="round" />

  <!-- White Core Speed Trails -->
  <path d="M -50 120 C 400 120, 600 60, 1000 90 C 1300 110, 1450 140, 1650 140" fill="none" stroke="url(#whiteStreak)" stroke-width="1.5" stroke-linecap="round" />
  <path d="M -50 140 C 300 140, 700 80, 1100 80 C 1350 80, 1500 120, 1650 120" fill="none" stroke="url(#whiteStreak)" stroke-width="1" stroke-linecap="round" />
</svg>
