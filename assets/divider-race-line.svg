<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 70" width="100%" height="70">
  <defs>
    <!-- Gradients -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff1744" stop-opacity="0" />
      <stop offset="25%" stop-color="#ff1744" stop-opacity="0.3" />
      <stop offset="45%" stop-color="#ff1744" stop-opacity="1" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="55%" stop-color="#ff2d75" stop-opacity="1" />
      <stop offset="75%" stop-color="#ff2d75" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ff2d75" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="15%" stop-color="#ff1744" stop-opacity="0" />
      <stop offset="45%" stop-color="#ff1744" stop-opacity="0.5" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="55%" stop-color="#ff2d75" stop-opacity="0.5" />
      <stop offset="85%" stop-color="#ff2d75" stop-opacity="0" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1600" height="70" fill="none" />
  
  <!-- Outer glow -->
  <line x1="150" y1="35" x2="1450" y2="35" stroke="url(#glowGrad)" stroke-width="6" stroke-linecap="round" opacity="0.4" />
  
  <!-- Core glowing line -->
  <line x1="200" y1="35" x2="1400" y2="35" stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round" />
  
  <!-- High speed white streak in center -->
  <line x1="740" y1="35" x2="860" y2="35" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  
  <!-- Subtle chevrons pointing to center -->
  <!-- Left -->
  <g stroke="#ff1744" stroke-width="1.5" fill="none" opacity="0.6">
    <polyline points="480,30 485,35 480,40" />
    <polyline points="490,30 495,35 490,40" />
  </g>
  <!-- Right -->
  <g stroke="#ff2d75" stroke-width="1.5" fill="none" opacity="0.6">
    <polyline points="1120,30 1115,35 1120,40" />
    <polyline points="1110,30 1105,35 1110,40" />
  </g>
</svg>
