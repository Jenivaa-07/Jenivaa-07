<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Share+Tech+Mono&amp;family=Inter:wght@400;600;700&amp;display=swap');
      .title {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        font-size: 56px;
        fill: #ffffff;
        letter-spacing: 4px;
      }
      .subtitle {
        font-family: 'Orbitron', sans-serif;
        font-weight: 700;
        font-size: 18px;
        fill: #ff2d75;
        letter-spacing: 2px;
      }
      .mono-text {
        font-family: 'Share Tech Mono', monospace;
        font-size: 14px;
        fill: #8a8d9a;
        letter-spacing: 1px;
      }
      .tag {
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        font-size: 13px;
        fill: #ffffff;
      }
      .feature-text {
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 15px;
        fill: #ffffff;
      }
    </style>

    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f" />
      <stop offset="50%" stop-color="#12131a" />
      <stop offset="100%" stop-color="#07070a" />
    </linearGradient>

    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff1744" />
      <stop offset="50%" stop-color="#ff2d75" />
      <stop offset="100%" stop-color="#ff1744" />
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff1744" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ff2d75" stop-opacity="0.2" />
    </linearGradient>

    <linearGradient id="trackGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff1744" stop-opacity="0" />
      <stop offset="50%" stop-color="#ff2d75" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Card Background -->
  <rect x="10" y="10" width="780" height="430" rx="16" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="1.5" />

  <!-- Glassmorphic Corner Glows -->
  <path d="M 10 50 L 10 16 A 16 16 0 0 1 26 10 L 100 10" fill="none" stroke="#ff1744" stroke-width="4" stroke-linecap="round" />
  <path d="M 790 400 L 790 434 A 16 16 0 0 1 774 450 L 700 450" fill="none" stroke="#ff2d75" stroke-width="4" stroke-linecap="round" />

  <!-- Diagonal racing streak accents in background -->
  <path d="M -50 450 L 350 -50 H 380 L -20 450 Z" fill="#ff1744" opacity="0.03" />
  <path d="M 450 450 L 850 -50 H 880 L 480 450 Z" fill="#ff2d75" opacity="0.03" />

  <!-- Technical Telemetry / Grid lines -->
  <g opacity="0.1">
    <line x1="50" y1="80" x2="750" y2="80" stroke="#ffffff" stroke-width="0.5" />
    <line x1="50" y1="370" x2="750" y2="370" stroke="#ffffff" stroke-width="0.5" />
    <line x1="180" y1="80" x2="180" y2="370" stroke="#ffffff" stroke-width="0.5" />
  </g>

  <!-- Mock Telemetry Signal Graph -->
  <path d="M 50 350 L 80 345 L 100 352 L 120 338 L 140 350 L 160 320 L 180 348 L 200 310 L 220 335 L 240 330 L 260 348 L 280 340 L 300 350" fill="none" stroke="#ff1744" stroke-width="1" opacity="0.25" />
  <path d="M 50 350 L 80 345 L 100 352 L 120 338 L 140 350 L 160 320 L 180 348 L 200 310" fill="none" stroke="#ff2d75" stroke-width="1" opacity="0.4" />

  <!-- Abstract Race Track Circuit Path in Background (Right side) -->
  <path d="M 500 240 C 520 200, 560 160, 600 180 C 640 200, 660 250, 710 230 C 760 210, 740 130, 700 110 C 660 90, 610 110, 570 120 C 530 130, 480 160, 470 200 C 460 240, 480 290, 510 320 C 540 350, 580 340, 630 330 C 680 320, 730 350, 750 310 C 770 270, 740 250, 720 260 C 690 270, 660 290, 620 290 C 580 290, 550 260, 500 240 Z" fill="none" stroke="url(#trackGrad)" stroke-width="3" stroke-linecap="round" opacity="0.4" />
  <circle cx="500" cy="240" r="4" fill="#ffffff" opacity="0.8" />
  <text x="510" y="244" class="mono-text" font-size="10" opacity="0.6">T1 START/FINISH</text>

  <!-- Top Status bar -->
  <text x="40" y="45" class="mono-text" fill="#ff1744">● CORE_SYSTEM // ACTIVE</text>
  <text x="760" y="45" class="mono-text" text-anchor="end" fill="#ffffff">ENGAGEMENT: 99.8%</text>

  <!-- Card Title -->
  <text x="40" y="150" class="title">PADDOX</text>
  
  <!-- Glowing bar below title -->
  <rect x="40" y="170" width="380" height="3" fill="url(#borderGrad)" />
  <rect x="420" y="170" width="80" height="3" fill="#ffffff" />
  
  <!-- Subtitle -->
  <text x="40" y="205" class="subtitle">AI MOTORSPORT FAN PLATFORM</text>
  
  <!-- Description list -->
  <text x="40" y="245" class="feature-text">Predictive Analytics &amp; Recommendation Engine</text>
  <text x="40" y="275" class="feature-text">Real-Time Race Telemetry &amp; Live Fan Hub</text>
  <text x="40" y="305" class="feature-text">F1-Inspired E-Commerce &amp; Digital Assets</text>

  <!-- Bottom Details / Tags -->
  <g transform="translate(40, 390)">
    <!-- Tag 1 -->
    <rect x="0" y="-20" width="95" height="26" rx="4" fill="#ff1744" fill-opacity="0.15" stroke="#ff1744" stroke-width="1" />
    <text x="47.5" y="-3" class="tag" text-anchor="middle">FULL STACK</text>
    
    <!-- Tag 2 -->
    <rect x="110" y="-20" width="80" height="26" rx="4" fill="#ff2d75" fill-opacity="0.15" stroke="#ff2d75" stroke-width="1" />
    <text x="150" y="-3" class="tag" text-anchor="middle">AI / ML</text>

    <!-- Tag 3 -->
    <rect x="205" y="-20" width="95" height="26" rx="4" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-width="0.5" />
    <text x="252.5" y="-3" class="tag" text-anchor="middle">ANALYTICS</text>
  </g>

  <!-- Gear Indicator UI Accent (Top Right-ish) -->
  <g transform="translate(680, 160)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#ff2d75" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5" />
    <circle cx="0" cy="0" r="30" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3" />
    <text x="0" y="12" font-family="'Orbitron', sans-serif" font-weight="900" font-size="36" fill="#ffffff" text-anchor="middle">8</text>
    <text x="0" y="-18" class="mono-text" font-size="9" fill="#ff1744" text-anchor="middle">GEAR</text>
    <path d="M 21 21 L 28 28" stroke="#ffffff" stroke-width="1" opacity="0.7" />
  </g>

  <!-- Dial / Performance dashboard indicator -->
  <g transform="translate(580, 160)">
    <path d="M -30 15 A 33 33 0 1 1 30 15" fill="none" stroke="#444" stroke-width="4" stroke-linecap="round" />
    <path d="M -30 15 A 33 33 0 0 1 10 -31" fill="none" stroke="url(#borderGrad)" stroke-width="4" stroke-linecap="round" />
    <text x="0" y="5" font-family="'Share Tech Mono', monospace" font-size="16" fill="#ffffff" text-anchor="middle">320</text>
    <text x="0" y="18" class="mono-text" font-size="9" text-anchor="middle">KM/H</text>
  </g>
</svg>
