<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Share+Tech+Mono&amp;family=Inter:wght@400;600;700&amp;display=swap');
      .title {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        font-size: 72px;
        fill: #ffffff;
        letter-spacing: 4px;
      }
      .subtitle {
        font-family: 'Orbitron', sans-serif;
        font-weight: 700;
        font-size: 24px;
        fill: #ff2d75;
        letter-spacing: 2px;
      }
      .mono-text {
        font-family: 'Share Tech Mono', monospace;
        font-size: 16px;
        fill: #8a8d9a;
        letter-spacing: 1px;
      }
      .tag {
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        font-size: 15px;
        fill: #ffffff;
      }
      .feature-text {
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 19px;
        fill: #ffffff;
      }
    </style>

    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f" />
      <stop offset="50%" stop-color="#12131a" />
      <stop offset="100%" stop-color="#07070a" />
    </linearGradient>

    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff1744" />
      <stop offset="50%" stop-color="#ff2d75" />
      <stop offset="100%" stop-color="#ff1744" />
    </linearGradient>
    
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2d75" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#ff2d75" stop-opacity="0.0" />
    </radialGradient>
  </defs>

  <!-- Card Background -->
  <rect x="10" y="10" width="780" height="430" rx="16" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="1.5" />

  <!-- Glassmorphic Corner Glows -->
  <path d="M 10 50 L 10 16 A 16 16 0 0 1 26 10 L 100 10" fill="none" stroke="#ff1744" stroke-width="4" stroke-linecap="round" />
  <path d="M 790 400 L 790 434 A 16 16 0 0 1 774 450 L 700 450" fill="none" stroke="#ff2d75" stroke-width="4" stroke-linecap="round" />

  <!-- Diagonal racing accents in background -->
  <path d="M -50 450 L 350 -50 H 380 L -20 450 Z" fill="#ff1744" opacity="0.03" />
  <path d="M 450 450 L 850 -50 H 880 L 480 450 Z" fill="#ff2d75" opacity="0.03" />

  <!-- Technical Telemetry / Grid lines -->
  <g opacity="0.1">
    <line x1="50" y1="80" x2="750" y2="80" stroke="#ffffff" stroke-width="0.5" />
    <line x1="50" y1="370" x2="750" y2="370" stroke="#ffffff" stroke-width="0.5" />
    <line x1="180" y1="80" x2="180" y2="370" stroke="#ffffff" stroke-width="0.5" />
  </g>

  <!-- Neural Network Nodes in Background (Right side) -->
  <g opacity="0.4" stroke="#ff2d75" stroke-width="1">
    <line x1="500" y1="200" x2="580" y2="140" />
    <line x1="500" y1="200" x2="580" y2="260" />
    <line x1="580" y1="140" x2="680" y2="100" />
    <line x1="580" y1="140" x2="680" y2="200" />
    <line x1="580" y1="260" x2="680" y2="200" />
    <line x1="580" y1="260" x2="680" y2="300" />
    <line x1="680" y1="100" x2="740" y2="180" />
    <line x1="680" y1="200" x2="740" y2="180" />
    <line x1="680" y1="300" x2="740" y2="240" />
    <line x1="680" y1="200" x2="740" y2="240" />
  </g>

  <!-- Glowing node backgrounds -->
  <circle cx="500" cy="200" r="15" fill="url(#nodeGlow)" />
  <circle cx="580" cy="140" r="15" fill="url(#nodeGlow)" />
  <circle cx="580" cy="260" r="15" fill="url(#nodeGlow)" />
  <circle cx="680" cy="200" r="15" fill="url(#nodeGlow)" />
  <circle cx="740" cy="180" r="20" fill="url(#nodeGlow)" />
  <circle cx="740" cy="240" r="20" fill="url(#nodeGlow)" />

  <!-- Node dots -->
  <circle cx="500" cy="200" r="5" fill="#ff1744" />
  <circle cx="580" cy="140" r="5" fill="#ff2d75" />
  <circle cx="580" cy="260" r="5" fill="#ff2d75" />
  <circle cx="680" cy="200" r="4" fill="#ffffff" stroke="#ff2d75" stroke-width="1" />
  <circle cx="740" cy="180" r="6" fill="#ff1744" />
  <circle cx="740" cy="240" r="6" fill="#ff2d75" />

  <!-- Top Status bar -->
  <text x="40" y="45" class="mono-text" fill="#ff2d75">● DEPLOY_SYSTEM // QUEUED</text>
  <text x="760" y="45" class="mono-text" text-anchor="end" fill="#ffffff">SYSTEM PROGRESS: 75.0%</text>

  <!-- Card Title -->
  <text x="40" y="145" class="title">NEXT BUILD</text>
  
  <!-- Glowing bar below title -->
  <rect x="40" y="165" width="380" height="3" fill="url(#borderGrad)" />
  <rect x="420" y="165" width="80" height="3" fill="#ffffff" />
  
  <!-- Subtitle -->
  <text x="40" y="210" class="subtitle">FINAL YEAR AI SYSTEM</text>
  
  <!-- Description list -->
  <text x="40" y="255" class="feature-text">AI Recommendation Engine Architecture</text>
  <text x="40" y="295" class="feature-text">Predictive Fan Analytics Algorithms</text>
  <text x="40" y="335" class="feature-text">Motorsport Platform Core Integration</text>

  <!-- Bottom Details / Tags -->
  <g transform="translate(40, 395)">
    <!-- Tag 1 -->
    <rect x="0" y="-20" width="135" height="28" rx="4" fill="#ff1744" fill-opacity="0.15" stroke="#ff1744" stroke-width="1" />
    <text x="67.5" y="-2" class="tag" text-anchor="middle">RECOMMENDATION</text>
    
    <!-- Tag 2 -->
    <rect x="150" y="-20" width="100" height="28" rx="4" fill="#ff2d75" fill-opacity="0.15" stroke="#ff2d75" stroke-width="1" />
    <text x="200" y="-2" class="tag" text-anchor="middle">PREDICTION</text>

    <!-- Tag 3 -->
    <rect x="265" y="-20" width="100" height="28" rx="4" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-width="0.5" />
    <text x="315" y="-2" class="tag" text-anchor="middle">ANALYTICS</text>
  </g>

  <!-- Dial / Radar Accent -->
  <g transform="translate(680, 160)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#ff1744" stroke-dasharray="2 4" stroke-width="1" opacity="0.6" />
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#ff2d75" stroke-width="0.5" opacity="0.4" />
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#ff2d75" stroke-width="0.5" opacity="0.4" />
  </g>
</svg>
