<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Share+Tech+Mono&amp;family=Inter:wght@400;600;700&amp;display=swap');
      .title {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        font-size: 56px;
        fill: #ffffff;
        letter-spacing: 4px;
      }
      .subtitle {
        font-family: 'Orbitron', sans-serif;
        font-weight: 700;
        font-size: 18px;
        fill: #ff2d75;
        letter-spacing: 2px;
      }
      .mono-text {
        font-family: 'Share Tech Mono', monospace;
        font-size: 14px;
        fill: #8a8d9a;
        letter-spacing: 1px;
      }
      .tag {
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        font-size: 13px;
        fill: #ffffff;
      }
      .feature-text {
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 15px;
        fill: #ffffff;
      }
    </style>

    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f" />
      <stop offset="50%" stop-color="#12131a" />
      <stop offset="100%" stop-color="#07070a" />
    </linearGradient>

    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff1744" />
      <stop offset="50%" stop-color="#ff2d75" />
      <stop offset="100%" stop-color="#ff1744" />
    </linearGradient>

    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff1744" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ff1744" stop-opacity="0.0" />
    </linearGradient>
    
    <linearGradient id="chartGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff2d75" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ff2d75" stop-opacity="0.0" />
    </linearGradient>
  </defs>

  <!-- Card Background -->
  <rect x="10" y="10" width="780" height="430" rx="16" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="1.5" />

  <!-- Glassmorphic Corner Glows -->
  <path d="M 10 50 L 10 16 A 16 16 0 0 1 26 10 L 100 10" fill="none" stroke="#ff1744" stroke-width="4" stroke-linecap="round" />
  <path d="M 790 400 L 790 434 A 16 16 0 0 1 774 450 L 700 450" fill="none" stroke="#ff2d75" stroke-width="4" stroke-linecap="round" />

  <!-- Diagonal racing streak accents in background -->
  <path d="M -50 450 L 350 -50 H 380 L -20 450 Z" fill="#ff1744" opacity="0.03" />
  <path d="M 450 450 L 850 -50 H 880 L 480 450 Z" fill="#ff2d75" opacity="0.03" />

  <!-- Technical Telemetry / Grid lines -->
  <g opacity="0.1">
    <line x1="50" y1="80" x2="750" y2="80" stroke="#ffffff" stroke-width="0.5" />
    <line x1="50" y1="370" x2="750" y2="370" stroke="#ffffff" stroke-width="0.5" />
    <line x1="180" y1="80" x2="180" y2="370" stroke="#ffffff" stroke-width="0.5" />
  </g>

  <!-- Beautiful Analytics Charts in Background (Right side) -->
  <!-- Area Chart 1 (Red) -->
  <path d="M 450 350 L 480 290 L 510 320 L 540 240 L 570 280 L 600 190 L 630 220 L 660 140 L 690 180 L 720 110 L 750 150 L 750 350 Z" fill="url(#chartGrad)" />
  <path d="M 450 350 L 480 290 L 510 320 L 540 240 L 570 280 L 600 190 L 630 220 L 660 140 L 690 180 L 720 110 L 750 150" fill="none" stroke="#ff1744" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
  
  <!-- Area Chart 2 (Magenta) -->
  <path d="M 450 350 L 470 310 L 500 270 L 530 290 L 560 210 L 590 250 L 620 170 L 650 200 L 680 120 L 710 160 L 740 90 L 750 110 L 750 350 Z" fill="url(#chartGrad2)" />
  <path d="M 450 350 L 470 310 L 500 270 L 530 290 L 560 210 L 590 250 L 620 170 L 650 200 L 680 120 L 710 160 L 740 90 L 750 110" fill="none" stroke="#ff2d75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" />

  <!-- Data point markers -->
  <circle cx="720" cy="110" r="4" fill="#ffffff" stroke="#ff1744" stroke-width="1.5" />
  <circle cx="680" cy="120" r="3" fill="#ffffff" stroke="#ff2d75" stroke-width="1.5" />

  <!-- Top Status bar -->
  <text x="40" y="45" class="mono-text" fill="#ff1744">● ANALYTICS_SYSTEM // ACTIVE</text>
  <text x="760" y="45" class="mono-text" text-anchor="end" fill="#ffffff">COMPILING DATA: 99.4%</text>

  <!-- Card Title -->
  <text x="40" y="150" class="title">INSIGHTAI</text>
  
  <!-- Glowing bar below title -->
  <rect x="40" y="170" width="380" height="3" fill="url(#borderGrad)" />
  <rect x="420" y="170" width="80" height="3" fill="#ffffff" />
  
  <!-- Subtitle -->
  <text x="40" y="205" class="subtitle">AI DATA ANALYTICS DASHBOARD</text>
  
  <!-- Description list -->
  <text x="40" y="245" class="feature-text">Automated CSV &amp; Excel Analytics</text>
  <text x="40" y="275" class="feature-text">AI-Powered Predictive Insights</text>
  <text x="40" y="305" class="feature-text">Interactive Visual Telemetry Reports</text>

  <!-- Bottom Details / Tags -->
  <g transform="translate(40, 390)">
    <!-- Tag 1 -->
    <rect x="0" y="-20" width="80" height="26" rx="4" fill="#ff1744" fill-opacity="0.15" stroke="#ff1744" stroke-width="1" />
    <text x="40" y="-3" class="tag" text-anchor="middle">PYTHON</text>
    
    <!-- Tag 2 -->
    <rect x="95" y="-20" width="80" height="26" rx="4" fill="#ff2d75" fill-opacity="0.15" stroke="#ff2d75" stroke-width="1" />
    <text x="135" y="-3" class="tag" text-anchor="middle">AI / ML</text>

    <!-- Tag 3 -->
    <rect x="190" y="-20" width="105" height="26" rx="4" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-width="0.5" />
    <text x="242.5" y="-3" class="tag" text-anchor="middle">DASHBOARDS</text>
  </g>

  <!-- Analytical Dial Accent -->
  <g transform="translate(680, 160)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#444" stroke-width="2" />
    <path d="M 0 -35 A 35 35 0 1 1 -24.7 24.7" fill="none" stroke="#ff2d75" stroke-width="3" stroke-linecap="round" />
    <text x="0" y="10" font-family="'Orbitron', sans-serif" font-weight="900" font-size="20" fill="#ffffff" text-anchor="middle">92%</text>
    <text x="0" y="-20" class="mono-text" font-size="9" fill="#ff1744" text-anchor="middle">ACCURACY</text>
  </g>
</svg>
